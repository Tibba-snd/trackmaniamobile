name: Build Android APK

# Lives at the repository ROOT so GitHub Actions actually discovers and runs it.
# (The copy at apk-build/.github/workflows/ is inert — GitHub only reads .github/
# at the root of the default branch.)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apk-build/package-lock.json

      - name: Install JS deps (Capacitor CLI)
        working-directory: apk-build
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # www/ is gitignored by design (it's a generated mirror of the root game files),
      # so regenerate it from the canonical root source before building. This is the
      # same `node dd.js sync` the developer runs locally.
      - name: Sync web assets into apk-build/www
        run: node dd.js sync

      - name: Build debug APK
        working-directory: apk-build/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: driftdream-debug-apk
          path: apk-build/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
